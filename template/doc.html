<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Mes Documents</title>
  <style>
    body { font-family: Arial; background:#f1f5f9; padding:20px; }
    .doc { background:white; padding:10px; margin:10px 0; border-radius:6px; }
    a { color:#2563eb; }
    /* Style global */
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(135deg, #1e3a8a, #3b82f6, #60a5fa);
  min-height: 100vh;
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f1f5f9;
}

/* Carte centrale */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  padding: 30px;
  border-radius: 16px;
  width: 340px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  color: #fff;
  animation: fadeIn 0.6s ease;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 600;
}

label {
  display: block;
  margin-top: 12px;
  font-size: 0.95rem;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: #fff;
  font-size: 1rem;
}

input:focus {
  outline: none;
  background: rgba(255,255,255,0.3);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.4);
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 600;
  transition: all 0.3s;
}

button:hover {
  background: #2563eb;
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* Tableau utilisateur/admin */
.container {
  max-width: 900px;
  margin: 40px auto;
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 30px;
  color: #fff;
}

.student, .doc {
  background: rgba(255,255,255,0.15);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  transition: all 0.3s;
}

.student:hover, .doc:hover {
  transform: translateX(5px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
}

a {
  color: #facc15;
  text-decoration: none;
  font-weight: 600;
}

a:hover {
  text-decoration: underline;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

  </style>
</head>
<body>
  <h2>Mes documents</h2>
  <div id="docs"></div>

<script>
const user = JSON.parse(localStorage.getItem('currentUser'));
if(!user){ alert("Non connecté"); window.location.href="login.html"; }

function renderDocs(){
  const div = document.getElementById('docs');
  div.innerHTML="";
  user.docs.forEach(d=>{
    div.innerHTML += `<div class="doc"><strong>${d.title}</strong><br><a href="${d.url}" download>Télécharger</a></div>`;

    function downloadFile(url, filename) { const a = document.createElement('a');
     a.href = url; a.download = filename; // nom du fichier sauvegardé document
    .body.appendChild(a); a.click(); 
    document.body.removeChild(a);
   }});
}
renderDocs();
</script>
</body>
</html>
