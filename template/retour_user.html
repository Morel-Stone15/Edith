<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>EDITH - IST Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body { 
      font-family:'Inter',sans-serif; 
      background: url('EDITH.jpeg') no-repeat center center fixed; 
      background-size: cover;
      height:100vh; 
      display:flex; 
      flex-direction:column; 
      color:#e2e8f0; 
    } 

    header { 
      background: rgba(0,0,0,0.5); 
      padding: 14px 20px; 
      display:flex; 
      align-items:center; 
      gap:14px; 
      position: relative; 
      justify-content: space-between; 
    }

    .hamburger-container { margin-left: auto; position: relative; }
    #hamburger { cursor: pointer; padding: 8px; }
    #menu {
      display: none;
      position: absolute;
      top: 60px;
      right: 10px;
      background: #0f172a;
      border-radius: 12px;
      padding: 12px 0;
      min-width: 220px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      z-index: 1000;
    }
    #menu a {
      display: block;
      padding: 10px 20px;
      color: #e2e8f0;
      text-decoration: none;
      font-size: 14px;
    }
    #menu a:hover { background: rgba(59, 130, 246, 0.2); }

    .avatar { width:50px; height:50px; background:#3b82f6; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .info h2 { font-size:17px; font-weight:600; }
    .info p { font-size:13px; opacity:0.7; }

    #messages { flex:1; overflow-y:auto; padding:20px 12px; display:flex; flex-direction:column; gap:14px; }
    .msg { max-width:80%; padding:10px 16px; border-radius:18px; line-height:1.5; word-wrap:break-word; }
    .msg.me { align-self:flex-end; background:#3b82f6; color:white; }
    .msg.bot { align-self:flex-start; background:#112035; color: white; }
    .typing { font-style:italic; opacity:0.7; }

    .input-bar { 
      background: url('EDITH.jpeg') no-repeat center center; 
      background-size: cover; 
      padding: 12px 16px; 
      display: flex; 
      gap: 10px; 
      align-items: center; 
      border-top: 2px solid rgba(255,255,255,0.2); 
      position: relative;
    }
    .input-bar::before {
      content: "";
      position: absolute;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.4); 
      z-index: 0;
      border-radius: inherit;
    }
    .input-bar > * { position: relative; z-index: 1; }

    #input { flex:1; padding:14px 18px; border:none; border-radius:30px; background:#334155; color:#e8e8e8; font-size:16px; }
    #input:focus { outline:none; background:#475569; }
    button { width:48px; height:48px; border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    #send { background:#3b82f6; color:white; }
    #speak-button { background:#10b981; color:white; }
  </style>
</head>
<body>
  <header>
    <div class="avatar">🐘</div>
    <div class="hamburger-container">
      <div id="hamburger" class="hamburger" title="Menu">
        <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect y="1" width="22" height="2" rx="1" fill="#e6eef8"/>
          <rect y="7" width="22" height="2" rx="1" fill="#e6eef8"/>
          <rect y="13" width="22" height="2" rx="1" fill="#e6eef8"/>
        </svg>
      </div>
      <div id="menu" class="menu" role="menu" aria-hidden="true">
        <a id="link-logout" href="/template/index.html" style="border-top:1px solid rgba(255,255,255,0.03); margin-top:6px; padding-top:8px;">Déconnexion</a>
      </div>
    </div>
  </header>

  <div id="messages">
    <div class="msg bot">
      <h1>Bienvenue <span id="studentName"></span>!</h1>
      <p>Ton matricule est <span id="studentMatricule"></span>.<br>
      Je suis EDITH, ton assistant de l’Institut Supérieur de Technologie.<br>
      Je peux te demander ta moyenne, ton emploi du temps, ou juste discuter avec toi !</p>
    </div>
  </div>

  <div class="input-bar">
    <input type="text" id="input" placeholder="Écris un message..." autocomplete="off">
    <button id="send" title="Envoyer"><i class="ph-bold ph-paper-plane-right" style="font-size:22px;"></i></button>
    <button id="speak-button" title="Écouter le dernier message"><i class="ph-bold ph-speaker-high" style="font-size:22px;"></i></button>
  </div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const send = document.getElementById('send');
const speakBtn = document.getElementById('speak-button');
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');
const logoutLink = document.getElementById('link-logout');

// Affiche nom et matricule depuis localStorage
document.getElementById('studentName').textContent = localStorage.getItem('user') || "Étudiant";
document.getElementById('studentMatricule').textContent = localStorage.getItem('matricule') || "CTECH00000";

function addMessage(text, who='bot'){
  const div = document.createElement('div');
  div.className = 'msg ' + (who==='me' ? 'me' : 'bot');
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function getRandomResponse(list){ return list[Math.floor(Math.random()*list.length)]; }

function typeWriter(element, text, speed=40){
  let i=0;
  element.textContent="";
  const interval=setInterval(()=>{
    element.textContent += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },speed);
}

function sendMessage(text){
  addMessage(text,'me');
  const typingDiv = addMessage("EDITH écrit...",'bot');
  typingDiv.classList.add('typing');

  setTimeout(()=>{
    let msg=text.toLowerCase(), response='';
    if(msg.includes('bonjour')||msg.includes('salut')){
      response=getRandomResponse(['Salut ! Comment puis-je t\'aider ?','Bonjour! En quoi puis-je t\'aider ?']);
    } else if(msg.includes('merci')){
      response=getRandomResponse(['Avec plaisir !','De rien !']);
    } else if(msg.includes('emploi')){
      response='Ton emploi du temps est prochainement disponible sur le portail étudiant.';
    } else if(msg.includes('note')){
      response='Tes notes seront publiées après le conseil de classe.';
    } else {
      response='Je suis EDITH, une intelligence artificielle pour les étudiants de l\'IST. En quoi puis-je t\'aider ?';
    }
    typingDiv.classList.remove('typing');
    typeWriter(typingDiv,response,40);
  },800);
}

// Envoi message
send.addEventListener('click',()=>{
  const v=input.value.trim();
  if(!v) return;
  sendMessage(v);
  input.value='';
});

// Envoi avec touche Entrée
input.addEventListener('keydown',e=>{ if(e.key==='Enter') send.click(); });

// Lecture vocale du dernier message bot
speakBtn.addEventListener('click',()=>{
  const bots=document.querySelectorAll('.msg.bot');
  if(!bots.length) return;
  const text=bots[bots.length-1].textContent;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
});

// Hamburger menu
let menuOpen = false;
hamburger.addEventListener('click', () => {
  menuOpen = !menuOpen;
  menu.style.display = menuOpen ? 'block' : 'none';
  menu.setAttribute('aria-hidden', (!menuOpen).toString());
});
document.addEventListener('click', (e) => {
  if(!hamburger.contains(e.target) && !menu.contains(e.target)){
    menuOpen = false;
    menu.style.display = 'none';
  }
});

</script>
</body>
</html>
